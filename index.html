<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подбор аналогов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1EFE8;
    --bg-elevated:#FFFFFF;
    --ink:#24303D;
    --ink-soft:#69727D;
    --line:#DAD5C8;
    --user:#33445C;
    --user-ink:#F1EFE8;
    --strong:#2F6F62;
    --strong-bg:#E7EFEC;
    --partial:#B57A22;
    --partial-bg:#F3EADA;
    --danger:#9C4F3E;
    --radius:10px;
    --mono:'IBM Plex Mono', ui-monospace, monospace;
    --sans:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:720px;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
  }

  /* ---------- header ---------- */
  header{
    padding:28px 20px 18px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
  }
  h1{
    margin:0 0 4px;
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  header p{
    margin:0;
    font-size:13.5px;
    color:var(--ink-soft);
    line-height:1.5;
  }

  /* ---------- thread ---------- */
  .thread{
    flex:1;
    overflow-y:auto;
    padding:20px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  .msg{
    max-width:88%;
    animation:rise .25s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .msg.user{
    align-self:flex-end;
    background:var(--user);
    color:var(--user-ink);
    padding:10px 14px;
    border-radius:var(--radius) var(--radius) 4px var(--radius);
    font-size:14.5px;
    line-height:1.5;
  }
  .msg.bot-text{
    align-self:flex-start;
    background:var(--bg-elevated);
    border:1px solid var(--line);
    padding:10px 14px;
    border-radius:var(--radius) var(--radius) var(--radius) 4px;
    font-size:14.5px;
    line-height:1.5;
  }
  .msg.error{
    border-color:var(--danger);
    color:var(--danger);
  }

  /* ---------- result group ---------- */
  .result-group{
    align-self:flex-start;
    width:100%;
    max-width:100%;
  }
  .result-head{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .result-head .fp{
    font-weight:700;
    font-size:15px;
  }
  .tag{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:2px 7px;
    border-radius:20px;
    border:1px solid var(--line);
    color:var(--ink-soft);
    background:var(--bg-elevated);
  }
  .result-empty{
    font-size:13.5px;
    color:var(--ink-soft);
    background:var(--bg-elevated);
    border:1px dashed var(--line);
    border-radius:var(--radius);
    padding:12px 14px;
  }

  /* ---------- card (signature element: catalog index card) ---------- */
  .cards{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .card{
    position:relative;
    background:var(--bg-elevated);
    border:1px solid var(--line);
    border-radius:8px;
    padding:14px 14px 12px 16px;
    box-shadow:0 1px 0 var(--line);
  }
  .card::before{
    content:attr(data-pid);
    position:absolute;
    top:-9px;
    left:14px;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.05em;
    background:var(--bg);
    color:var(--ink-soft);
    padding:0 6px;
  }
  .card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:4px;
  }
  .card-name{
    font-weight:600;
    font-size:14.5px;
  }
  .card-vendor{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .verdict{
    flex:0 0 auto;
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.04em;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:20px;
    white-space:nowrap;
  }
  .verdict.strong{ color:var(--strong); background:var(--strong-bg); }
  .verdict.partial{ color:var(--partial); background:var(--partial-bg); }
  .card-reason{
    font-size:13px;
    color:var(--ink);
    line-height:1.5;
    margin-top:6px;
  }

  /* ---------- typing indicator ---------- */
  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:12px 14px;
    background:var(--bg-elevated);
    border:1px solid var(--line);
    border-radius:var(--radius) var(--radius) var(--radius) 4px;
  }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--ink-soft);
    animation:bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{
    0%,80%,100%{transform:translateY(0); opacity:.5;}
    40%{transform:translateY(-4px); opacity:1;}
  }
  @media (prefers-reduced-motion: reduce){
    .msg{animation:none;}
    .typing span{animation:none; opacity:.7;}
  }

  /* ---------- input ---------- */
  form{
    display:flex;
    gap:8px;
    padding:14px 16px 20px;
    border-top:1px solid var(--line);
    background:var(--bg);
  }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:11px 13px;
    font-family:var(--sans);
    font-size:14.5px;
    color:var(--ink);
    background:var(--bg-elevated);
    max-height:120px;
  }
  textarea:focus{
    outline:2px solid var(--user);
    outline-offset:1px;
  }
  button{
    border:none;
    border-radius:var(--radius);
    background:var(--user);
    color:var(--user-ink);
    padding:0 18px;
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    cursor:pointer;
  }
  button:disabled{
    opacity:.5;
    cursor:default;
  }
  button:focus-visible, textarea:focus-visible{
    outline:2px solid var(--user);
    outline-offset:2px;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="eyebrow">Каталог · подбор аналогов</div>
    <h1>Спросите про замену</h1>
    <p>Опишите иностранный продукт или нужный функционал — подберём варианты из портфеля.</p>
  </header>

  <div class="thread" id="thread"></div>

  <form id="form">
    <textarea id="input" rows="1" placeholder="Например: нужен аналог Adobe Photoshop" required></textarea>
    <button type="submit" id="send">Спросить</button>
  </form>

</div>

<script>
// ==========================================================
// НАСТРОЙКА: вставьте сюда production-URL вашего n8n webhook
// (Webhook /match1 → вкладка Webhook URLs → Production URL)
// ==========================================================
const WEBHOOK_URL = 'https://YOUR_N8N_HOST/webhook/match';

const thread = document.getElementById('thread');
const form = document.getElementById('form');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');

function el(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function addUserMsg(text){
  const m = el('div', 'msg user', text);
  thread.appendChild(m);
  scrollDown();
}

function addBotText(text, isError){
  const m = el('div', 'msg bot-text' + (isError ? ' error' : ''), text);
  thread.appendChild(m);
  scrollDown();
}

function addTyping(){
  const t = el('div', 'typing');
  t.id = 'typing-indicator';
  t.appendChild(el('span'));
  t.appendChild(el('span'));
  t.appendChild(el('span'));
  thread.appendChild(t);
  scrollDown();
  return t;
}

function removeTyping(t){
  if (t && t.parentNode) t.parentNode.removeChild(t);
}

function scrollDown(){
  requestAnimationFrame(() => { thread.scrollTop = thread.scrollHeight; });
}

const STATUS_LABEL = {
  no_confident_match: 'нет уверенного совпадения',
  too_many_refine_query: 'слишком много вариантов — уточните'
};
const SOURCE_LABEL = {
  mapping: 'проверено экспертом',
  rag: 'по смыслу из каталога'
};

function renderResults(payload){
  const group = el('div', 'result-group');

  (payload.results || []).forEach(r => {
    const head = el('div', 'result-head');
    head.appendChild(el('span', 'fp', r.foreign_product || 'Запрос'));
    if (r.source) head.appendChild(el('span', 'tag', SOURCE_LABEL[r.source] || r.source));
    group.appendChild(head);

    if (r.status === 'no_confident_match' || r.status === 'too_many_refine_query' || !r.matches || !r.matches.length) {
      group.appendChild(el('div', 'result-empty', STATUS_LABEL[r.status] || 'Ничего не найдено.'));
      return;
    }

    const cards = el('div', 'cards');
    r.matches.forEach(m => {
      const card = el('div', 'card');
      card.setAttribute('data-pid', m.product_id || '');

      const top = el('div', 'card-top');
      const left = el('div');
      left.appendChild(el('div', 'card-name', m.name || ''));
      if (m.vendor) left.appendChild(el('div', 'card-vendor', m.vendor));
      top.appendChild(left);
      top.appendChild(el('span', 'verdict ' + (m.verdict === 'strong' ? 'strong' : 'partial'),
        m.verdict === 'strong' ? 'подходит' : 'частично'));
      card.appendChild(top);

      if (m.reason) card.appendChild(el('div', 'card-reason', m.reason));
      cards.appendChild(card);
    });
    group.appendChild(cards);
  });

  thread.appendChild(group);
  scrollDown();
}

async function ask(query){
  const typing = addTyping();
  sendBtn.disabled = true;
  try{
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    removeTyping(typing);

    if (data.status === 'clarification_needed') {
      addBotText(data.question || 'Уточните, пожалуйста, запрос.');
    } else if (data.results) {
      renderResults(data);
    } else {
      addBotText('Пустой ответ от сервера.', true);
    }
  } catch(err){
    removeTyping(typing);
    addBotText('Не удалось получить ответ (' + err.message + '). Проверьте адрес webhook и CORS-настройки в n8n.', true);
  } finally {
    sendBtn.disabled = false;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addUserMsg(text);
  input.value = '';
  input.style.height = 'auto';
  ask(text);
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.requestSubmit();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

addBotText('Здравствуйте! Напишите, для какого продукта нужен аналог, или опишите нужный функционал.');
</script>
</body>
</html>
